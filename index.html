<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İPT v6.9 | Ultra Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #020202; --c: #0d0d0d; --r: #ff2e2e; --b: #0070ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { height: 100vh; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* AŞIRI MODERN GİRİŞ */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { width: 85%; max-width: 400px; padding: 40px; background: rgba(13, 13, 13, 0.9); border: 1px solid var(--p); border-radius: 2px; text-align: center; position: relative; box-shadow: 0 0 30px rgba(0, 255, 65, 0.1); }
        .login-box::before { content: ''; position: absolute; top: -5px; left: -5px; width: 20px; height: 20px; border-top: 2px solid var(--p); border-left: 2px solid var(--p); }
        .login-box::after { content: ''; position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; border-bottom: 2px solid var(--p); border-right: 2px solid var(--p); }
        
        .glitch { font-family: 'Orbitron'; font-weight: 900; font-size: 2.5rem; color: var(--p); text-shadow: 2px 2px #ff00de; letter-spacing: 5px; margin-bottom: 30px; }
        .inp-group { margin-bottom: 20px; text-align: left; }
        .inp-group label { display: block; font-size: 0.7rem; color: var(--p); margin-bottom: 5px; font-family: 'Orbitron'; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #222; color: var(--p); font-family: 'Orbitron'; font-size: 0.8rem; }
        input:focus { border-color: var(--p); background: #050505; }
        
        .btn-access { width: 100%; padding: 18px; background: transparent; border: 1px solid var(--p); color: var(--p); font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.4s; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%); }
        .btn-access:hover { background: var(--p); color: #000; box-shadow: 0 0 20px var(--p); }

        /* APP STRUCTURE */
        #app { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; width: 100%; }
        .page.active { display: block; }

        /* ADMİN ÖZELLİKLERİ (SİLME BUTONLARI) */
        .admin-card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn-del { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--r); background: rgba(255, 46, 46, 0.1); color: var(--r); font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; }
        .btn-del:active { background: var(--r); color: #fff; }

        /* MEDYA GRID */
        #vid-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .v-card { background: #111; border: 1px solid #222; height: 200px; display: flex; flex-direction: column; overflow: hidden; }
        .v-card iframe, .v-card video, .v-card img { width: 100%; flex: 1; border: none; background: #000; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #444; font-family: 'Orbitron'; font-size: 0.6rem; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--p); text-shadow: 0 0 10px var(--p); }

        /* CHAT */
        .chat-msg { margin-bottom: 10px; font-size: 0.9rem; }
        .chat-input { position: fixed; bottom: 70px; left: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #222; }
        .chat-input input { flex: 1; border: none; }
        .chat-input button { width: 60px; background: var(--p); border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="glitch">IM-P-T</div>
            <div class="inp-group">
                <label>KİMLİK</label>
                <input type="text" id="u" placeholder="KOD ADI">
            </div>
            <div class="inp-group" style="margin-bottom: 30px;">
                <label>ERİŞİM ANAHTARI</label>
                <input type="password" id="p" placeholder="********">
            </div>
            <button class="btn-access" id="loginBtn">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <div id="app">
        <div class="content" id="scroll-area">
            <div id="p-ann" class="page active"><h2>📢 KAYITLAR</h2><div id="ann-list"></div></div>
            <div id="p-vid" class="page"><h2>🎬 MEDYA</h2><div id="vid-list"></div></div>
            <div id="p-chat" class="page"><div id="chat-list"></div><div class="chat-input"><input type="text" id="mI" placeholder="Mesaj Gönder..."><button id="sB">➤</button></div></div>
            <div id="p-adm" class="page">
                <h2>🛡️ KONTROL MERKEZİ</h2>
                <div id="adm-form"><input type="password" id="aK" placeholder="ADMIN KEY"><button class="btn-access" id="aB" style="margin-top:10px;">YETKİLENDİR</button></div>
                <div id="adm-ctrl" style="display:none;">
                    <div id="u-list"></div>
                    <div class="admin-card">
                        <button class="btn-access" id="nAnn" style="font-size:0.7rem;">DUYURU PAYLAŞ</button>
                        <button class="btn-del" id="delAnn">❌ TÜM DUYURULARI SİL</button>
                    </div>
                    <div class="admin-card">
                        <button class="btn-access" id="nVid" style="background:var(--b); border-color:var(--b); color:#fff; font-size:0.7rem;">LİNK/SİTE EKLE</button>
                        <button class="btn-del" id="delVid">❌ TÜM MEDYAYI SİL</button>
                    </div>
                    <div class="admin-card">
                        <button class="btn-del" id="delChat" style="margin-top:0;">❌ TÜM SOHBETİ SİL</button>
                    </div>
                    <button class="btn-del" id="clearAll" style="background:var(--r); color:#fff; font-weight:900;">🔥 SİSTEMİ TAMAMEN SIFIRLA</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go('ann', this)">KAYIT</div>
            <div class="nav-item" onclick="go('vid', this)">MEDYA</div>
            <div class="nav-item" onclick="tabChat(this)">CHAT</div>
            <div class="nav-item" onclick="go('adm', this)">ADMİN</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const cfg = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        const users = {
            "osimhendizkapağı": ".321mustafa",
            "kuranokuyandefans": ".123reşit321.",
            "yetimhanekundakçısı": "ismailçipe",
            "müslimmendez": "mus10ta20fa30",
            "duvaradam": "geçityokberobaba41"
        };

        let me = "";

        // GİRİŞ: Gmail istemez, sadece kullanıcı adı ve şifre
        document.getElementById('loginBtn').onclick = () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            if(users[u] && users[u] === p) {
                me = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                set(ref(db, 'online/' + me), true);
                onDisconnect(ref(db, 'online/' + me)).remove();
                init();
            } else alert("ERİŞİM REDDEDİLDİ!");
        };

        window.go = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            el.classList.add('active');
        };

        window.tabChat = (el) => { go('chat', el); setTimeout(() => { const a = document.getElementById('scroll-area'); a.scrollTop = a.scrollHeight; }, 100); };

        function init() {
            // Aktifler
            onValue(ref(db, 'online'), s => {
                const l = document.getElementById('u-list'); if(!l) return;
                l.innerHTML = '<h4 style="color:var(--p); margin-bottom:10px;">AKTİF ÜYELER</h4>';
                const data = s.val() || {};
                Object.keys(users).forEach(user => {
                    l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#111; margin-bottom:5px;"><span>${user}</span><span style="color:${data[user] ? 'var(--p)' : '#333'}">●</span></div>`;
                });
            });

            // Medya
            onValue(ref(db, 'videos'), s => {
                const l = document.getElementById('vid-list'); l.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    let html = d.url.includes('youtu') ? `<iframe src="https://www.youtube.com/embed/${d.url.split('v=')[1]}"></iframe>` : `<iframe src="${d.url}"></iframe>`;
                    l.innerHTML = `<div class="v-card">${html}<div style="font-size:10px; padding:5px; text-align:center;">${d.t}</div></div>` + l.innerHTML;
                });
            });

            // Mesajlar & Duyurular (Standart akış)
            onValue(ref(db, 'messages'), s => {
                const l = document.getElementById('chat-list'); l.innerHTML = '';
                s.forEach(c => { const d = c.val(); l.innerHTML += `<div class="chat-msg"><b>${d.u}:</b> ${d.t}</div>`; });
            });
            onValue(ref(db, 'ann'), s => {
                const l = document.getElementById('ann-list'); l.innerHTML = '';
                s.forEach(c => { const d = c.val(); l.innerHTML = `<div style="border-left:2px solid var(--p); padding:10px; background:#111; margin-bottom:10px;">${d.t}</div>` + l.innerHTML; });
            });
        }

        // CHAT GÖNDER
        document.getElementById('sB').onclick = () => {
            const t = document.getElementById('mI').value.trim();
            if(t) { push(ref(db, 'messages'), { u: me, t: t }); document.getElementById('mI').value = ''; }
        };

        // ADMİN AKSİYONLARI
        document.getElementById('aB').onclick = () => {
            if(document.getElementById('aK').value === "imanpoweradmini31") {
                document.getElementById('adm-form').style.display = 'none';
                document.getElementById('adm-ctrl').style.display = 'block';
            }
        };

        document.getElementById('nAnn').onclick = () => { const t = prompt("Duyuru:"); if(t) push(ref(db, 'ann'), { t }); };
        document.getElementById('nVid').onclick = () => { const t = prompt("Başlık:"); const u = prompt("Link:"); if(t && u) push(ref(db, 'videos'), { t, url: u }); };

        // AYRI AYRI SİLME ÖZELLİKLERİ
        document.getElementById('delAnn').onclick = () => confirm("Tüm duyurular silinsin mi?") && set(ref(db, 'ann'), {});
        document.getElementById('delVid').onclick = () => confirm("Tüm medya silinsin mi?") && set(ref(db, 'videos'), {});
        document.getElementById('delChat').onclick = () => confirm("Tüm sohbet silinsin mi?") && set(ref(db, 'messages'), {});
        document.getElementById('clearAll').onclick = () => confirm("SİSTEM SIFIRLANSIN MI?") && set(ref(db, '/'), { ann:{}, videos:{}, messages:{}, online:{} });

    </script>
</body>
</html>
