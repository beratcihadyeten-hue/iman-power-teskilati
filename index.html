<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İmanPowerTeşkilatı | Operasyon Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #080808; --card: #121212; --err: #ff3e3e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden;
        }

        /* --- GİRİŞ PANELİ --- */
        #login-screen { 
            background: var(--card); padding: 30px; border-radius: 15px; 
            border: 1px solid var(--p); box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            width: 90%; max-width: 380px; text-align: center; z-index: 10;
        }
        h1 { font-family: 'Orbitron'; color: var(--p); font-size: 1.4rem; margin-bottom: 20px; letter-spacing: 2px; }
        .input-box { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: var(--p); margin-bottom: 5px; margin-left: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: #fff; border-radius: 8px; outline: none; font-family: 'Rajdhani'; font-size: 1rem;
        }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .login-btn { 
            width: 100%; padding: 15px; background: var(--p); color: #000; 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer; 
            font-family: 'Orbitron'; text-transform: uppercase; margin-top: 10px; transition: 0.3s;
        }

        /* --- ANA PANEL --- */
        #main-panel { 
            display: none; width: 100%; height: 100%; flex-direction: column; 
            background: var(--bg); max-width: 1000px; position: relative;
        }
        .header { 
            padding: 15px; background: var(--card); border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header span { color: var(--p); font-weight: 700; font-size: 1.1rem; }
        
        .duyuru-area { 
            background: rgba(0, 255, 65, 0.05); padding: 12px 15px; 
            border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; display: flex; gap: 10px;
        }
        .duyuru-tag { color: var(--p); font-weight: 800; }

        #chat-box { 
            flex-grow: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
        }
        .message { background: #1a1a1a; padding: 10px 14px; border-radius: 10px; max-width: 85%; align-self: flex-start; border: 1px solid #222; }
        .message.me { align-self: flex-end; background: #003311; border-color: var(--p); }
        .msg-info { display: block; font-size: 0.75rem; color: var(--p); font-weight: 700; margin-bottom: 4px; }
        .msg-text { font-size: 1rem; line-height: 1.4; word-wrap: break-word; }

        .input-area { 
            padding: 15px; background: var(--card); border-top: 1px solid #222;
            display: flex; gap: 10px; align-items: center;
        }
        #msgInput { flex-grow: 1; padding: 12px; }
        .send-btn { background: var(--p); border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        #adminBtn { background: var(--err); border: none; color: #fff; padding: 6px 12px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; cursor: pointer; }

        /* Mobil Optimizasyon */
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .header span { font-size: 0.9rem; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>SİSTEME SIZ</h1>
        <div class="input-box">
            <label>Teşkilat Kod Adı</label>
            <input type="text" id="uName" placeholder="Örn: duvaradam">
        </div>
        <div class="input-box">
            <label>Kayıtlı Gmail</label>
            <input type="email" id="uMail" placeholder="Örn: mail@gmail.com">
        </div>
        <div class="input-box">
            <label>Güvenlik Şifresi</label>
            <input type="password" id="uPass" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="teşkilatGiriş()">Erişim Sağla</button>
    </div>

    <div id="main-panel">
        <div class="header">
            <span id="ajanAdi">AJAN: BEKLENİYOR...</span>
            <button id="adminBtn" onclick="adminModu()">YÖNETİCİ</button>
        </div>
        <div class="duyuru-area">
            <span class="duyuru-tag">[DUYURU]:</span>
            <span id="annContent">Teşkilat verileri senkronize ediliyor...</span>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mesajınızı şifreleyin...">
            <button class="send-btn" onclick="mesajGönder()">></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            messagingSenderId: "809946654937",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- SİSTEM KAYITLARI (GÜNCELLENDİ) ---
        const teşkilatListesi = [
            { kod: "osimhendizkapağı", mail: "mustafaslan.gamer1907@gmail.com", sifre: ".321mustafa" },
            { kod: "kuranokuyandefans", mail: "reozt2000@gmail.com", sifre: ".123reşit31." },
            { kod: "yetimhanekundakçısı", mail: "g17058525@gmail.com", sifre: "ismailçipe" },
            { kod: "duvaradam", mail: "beratcihadyeten@gmail.com", sifre: "geçityokberobaba41" }
        ];

        let aktifAjan = null;

        window.teşkilatGiriş = function() {
            const k = document.getElementById('uName').value.trim();
            const m = document.getElementById('uMail').value.trim().toLowerCase();
            const s = document.getElementById('uPass').value;

            const ajan = teşkilatListesi.find(a => a.kod === k && a.mail === m && a.sifre === s);

            if(ajan) {
                aktifAjan = ajan;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                document.getElementById('ajanAdi').innerText = "AJAN: " + aktifAjan.kod.toUpperCase();
                paneliBaşlat();
            } else {
                alert("ERİŞİM ENGELLENDİ: Kimlik doğrulanamadı. Bilgilerini kontrol et!");
            }
        }

        function paneliBaşlat() {
            // Mesajları Canlı Al
            onValue(ref(db, 'chat'), (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                snapshot.forEach(item => {
                    const data = item.val();
                    const isMe = data.u === aktifAjan.kod ? 'me' : '';
                    chatBox.innerHTML += `
                        <div class="message ${isMe}">
                            <span class="msg-info">${data.u}</span>
                            <span class="msg-text">${data.t}</span>
                        </div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            // Duyuruyu Al
            onValue(ref(db, 'duyuru'), (snapshot) => {
                if(snapshot.exists()) document.getElementById('annContent').innerText = snapshot.val();
            });
        }

        window.mesajGönder = function() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                push(ref(db, 'chat'), {
                    u: aktifAjan.kod,
                    t: input.value.trim(),
                    time: Date.now()
                });
                input.value = '';
            }
        }

        window.adminModu = function() {
            const sifre = prompt("ADMIN GÜVENLİK KODU:");
            if(sifre === "admin31") {
                const aksiyon = prompt("1: Duyuru Değiştir\n2: Mesajları Temizle (DİKKAT)");
                if(aksiyon === "1") {
                    const yeniDuyuru = prompt("Yeni Duyuru Metni:");
                    if(yeniDuyuru) set(ref(db, 'duyuru'), yeniDuyuru);
                } else if(aksiyon === "2") {
                    if(confirm("Tüm mesajlar silinecek. Emin misin?")) set(ref(db, 'chat'), null);
                }
            } else {
                alert("YETKİSİZ ERİŞİM DENEMESİ!");
            }
        }

        // Enter tuşu ile mesaj gönderme
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') mesajGönder();
        });
    </script>
</body>
</html>
