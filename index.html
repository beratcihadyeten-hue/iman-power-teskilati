<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İPT v6.1 | Bam Bam</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --c: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { width: 90%; max-width: 380px; padding: 30px; background: var(--c); border: 2px solid var(--p); border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Rajdhani'; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* APP */
        #app { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 160px; scroll-behavior: smooth; }
        .page { display: none; flex-direction: column; width: 100%; }
        .page.active { display: flex; }

        /* HAT EKRANI DÜZELTME (Görüntüdeki hata burada çözüldü) */
        #p-call { height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 30px; }
        #p-call.active { display: flex; }
        .call-btn-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 150px; height: 150px; }
        #callBtn { width: 120px; height: 120px; border-radius: 50%; background: var(--p); border: none; font-size: 3rem; cursor: pointer; z-index: 10; transition: transform 0.2s; }
        #callBtn:active { transform: scale(0.9); }
        .pulse-ring { position: absolute; width: 100%; height: 100%; background: var(--p); border-radius: 50%; opacity: 0; z-index: 1; }
        .ringing .pulse-ring { animation: ring-pulse 1.5s infinite; background: #ff3e3e; }
        @keyframes ring-pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

        /* CHAT */
        #chat-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .chat-msg { display: flex; flex-direction: column; width: 100%; }
        .chat-msg.me { align-items: flex-end; }
        .chat-msg.other { align-items: flex-start; }
        .msg-inner { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 1rem; word-break: break-word; line-height: 1.4; }
        .me .msg-inner { background: var(--p); color: #000; border-bottom-right-radius: 2px; }
        .other .msg-inner { background: #222; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg-u { font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
        .other .msg-u { color: var(--p); }

        .chat-input-area { position: fixed; bottom: 85px; left: 0; width: 100%; padding: 10px; background: rgba(0,0,0,0.9); display: flex; gap: 8px; border-top: 1px solid #222; }
        .chat-input-area input { flex: 1; margin: 0; border-radius: 25px; background: #111; padding: 12px 20px; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 0.6rem; font-family: 'Orbitron'; cursor: pointer; }
        .nav-item.active { color: var(--p); }

        /* ADMIN */
        .adm-btn-red { background: #ff3e3e !important; color: #fff !important; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .online-dot.active { background: var(--p); box-shadow: 0 0 8px var(--p); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--p)">İM-P-T</h1>
            <input type="text" id="u" placeholder="Kod Adı">
            <input type="email" id="m" placeholder="Gmail">
            <input type="password" id="p" placeholder="Şifre">
            <button class="btn-main" id="loginBtn">SİSTEME GİRİŞ</button>
        </div>
    </div>

    <div id="app">
        <div class="content" id="scroll-area">
            <div id="p-ann" class="page active"><h2>📢 KAYITLAR</h2><div id="ann-list"></div></div>
            <div id="p-vid" class="page"><h2>🎬 MEDYA</h2><div id="vid-list" style="display:grid; gap:15px;"></div></div>
            
            <div id="p-call" class="page">
                <div class="call-btn-wrapper" id="callWrap">
                    <div class="pulse-ring"></div>
                    <button id="callBtn" onclick="startCall()">📞</button>
                </div>
                <h3 id="call-status" style="font-family:'Orbitron'; color:#444;">HAT BEKLENİYOR</h3>
            </div>

            <div id="p-chat" class="page"><div id="chat-list"></div><div class="chat-input-area"><input type="text" id="mI" placeholder="Mesaj..."><button id="sB" class="btn-main" style="width:50px; margin:0; border-radius:50%;">➤</button></div></div>
            
            <div id="p-adm" class="page">
                <h2>🛡️ PANEL</h2>
                <div id="adm-form"><input type="password" id="aK" placeholder="Key"><button class="btn-main" id="aB">YETKİ AL</button></div>
                <div id="adm-ctrl" style="display:none;">
                    <div id="u-list" style="margin-bottom:20px;"></div>
                    <button class="btn-main" id="nAnn">📢 DUYURU EKLE</button>
                    <button class="btn-main adm-btn-red" id="dAnn">🗑️ DUYURULARI TEMİZLE</button>
                    <button class="btn-main" id="nVid" style="background:#0055ff; color:#fff;">🎬 LİNK EKLE</button>
                    <button class="btn-main adm-btn-red" id="dVid">🗑️ MEDYALARI TEMİZLE</button>
                    <button class="btn-main" id="sCl" style="background:#ff9900; color:#000;">📞 ARAMA BAŞLAT</button>
                    <button class="btn-main adm-btn-red" id="eCl">🚫 ARAMA BİTİR</button>
                    <button class="btn-main adm-btn-red" id="cCl">🗑️ CHATI SIFIRLA</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go('ann', this)">📢<span>KAYIT</span></div>
            <div class="nav-item" onclick="go('vid', this)">🎬<span>MEDYA</span></div>
            <div class="nav-item" onclick="go('call', this)">📞<span>HAT</span></div>
            <div class="nav-item" onclick="tabChat(this)">💬<span>CHAT</span></div>
            <div class="nav-item" onclick="go('adm', this)">🛡️<span>ADMİN</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const cfg = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        const users = {
            "osimhendizkapağı": { m: "mdegirmenci244@gmail.com", p: ".321mustafa" },
            "kuranokuyandefans": { m: "reozt2000@gmail.com", p: ".123reşit321." },
            "yetimhanekundakçısı": { m: "g17058525@gmail.com", p: "ismailçipe" },
            "müslimmendez": { m: "mustafaslan.gamer1907@gmail.com", p: "mus10ta20fa30" },
            "duvaradam": { m: "beratcihadyeten@gmail.com", p: "geçityokberobaba41" }
        };

        let me = "";
        window.roomUrl = null;

        document.getElementById('loginBtn').onclick = () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const m = document.getElementById('m').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            if(users[u] && users[u].m === m && users[u].p === p) {
                me = u; 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                set(ref(db, 'online/' + me), true);
                onDisconnect(ref(db, 'online/' + me)).remove();
                init();
            } else alert("Reddedildi.");
        };

        window.go = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active'); 
            el.classList.add('active');
        };

        window.tabChat = (el) => { go('chat', el); setTimeout(scrollChat, 100); };
        function scrollChat() { const a = document.getElementById('scroll-area'); a.scrollTop = a.scrollHeight; }

        function init() {
            onValue(ref(db, 'ann'), s => {
                const list = document.getElementById('ann-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    list.innerHTML = `<div style="background:#111; padding:15px; border-radius:12px; margin-bottom:10px; border-left:4px solid var(--p);"><b>${d.t}</b><br><small style="color:#555">${d.time}</small></div>` + list.innerHTML;
                });
            });

            onValue(ref(db, 'videos'), s => {
                const list = document.getElementById('vid-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    let h = d.url.includes('youtu') ? `<iframe src="https://www.youtube.com/embed/${d.url.includes('v=')?d.url.split('v=')[1].split('&')[0]:d.url.split('/').pop()}" frameborder="0" allowfullscreen style="width:100%; aspect-ratio:16/9; border-radius:10px;"></iframe>` : `<video src="${d.url}" controls style="width:100%; border-radius:10px;"></video>`;
                    list.innerHTML = `<div style="background:#111; padding:10px; border-radius:15px; border:1px solid #222;">${h}<div style="padding-top:10px; color:var(--p); font-weight:bold;">${d.t}</div></div>` + list.innerHTML;
                });
            });

            onValue(ref(db, 'messages'), s => {
                const list = document.getElementById('chat-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    const cls = d.u === me ? 'me' : 'other';
                    list.innerHTML += `<div class="chat-msg ${cls}"><div class="msg-inner"><div class="msg-u">${d.u}</div>${d.t}</div></div>`;
                });
                scrollChat();
            });

            onValue(ref(db, 'callRoom'), s => {
                const d = s.val(); const wrap = document.getElementById('callWrap'); const st = document.getElementById('call-status');
                if(d && d.active) { wrap.classList.add('ringing'); st.innerText = "HAT AKTİF"; st.style.color = "#ff3e3e"; window.roomUrl = d.url; }
                else { wrap.classList.remove('ringing'); st.innerText = "HAT BEKLENİYOR"; st.style.color = "#444"; window.roomUrl = null; }
            });

            onValue(ref(db, 'online'), s => {
                const list = document.getElementById('u-list'); if(!list) return;
                list.innerHTML = '<h4 style="color:var(--p); margin-bottom:10px;">AKTİF PERSONEL</h4>';
                const on = s.val() || {};
                Object.keys(users).forEach(usr => {
                    list.innerHTML += `<div class="user-row">${usr} <div class="online-dot ${on[usr] ? 'active' : ''}"></div></div>`;
                });
            });
        }

        window.startCall = () => { if(window.roomUrl) window.open(window.roomUrl); else alert("Aktif hat yok."); };

        document.getElementById('sB').onclick = () => {
            const t = document.getElementById('mI').value.trim();
            if(t) { push(ref(db, 'messages'), { u: me, t: t }); document.getElementById('mI').value = ''; }
        };

        document.getElementById('aB').onclick = () => {
            if(document.getElementById('aK').value === "imanpoweradmini31") {
                document.getElementById('adm-form').style.display = 'none';
                document.getElementById('adm-ctrl').style.display = 'block';
            }
        };

        // ADMIN FONKSİYONLARI
        document.getElementById('nAnn').onclick = () => { const t = prompt("Duyuru:"); if(t) push(ref(db, 'ann'), { t: t, time: new Date().toLocaleString() }); };
        document.getElementById('dAnn').onclick = () => { if(confirm("Tüm duyurular silinsin mi?")) remove(ref(db, 'ann')); };
        document.getElementById('nVid').onclick = () => { const t = prompt("Başlık:"); const u = prompt("Link:"); if(t && u) push(ref(db, 'videos'), { t, url: u }); };
        document.getElementById('dVid').onclick = () => { if(confirm("Tüm medyalar silinsin mi?")) remove(ref(db, 'videos')); };
        document.getElementById('sCl').onclick = () => { const u = prompt("Arama Linki:"); if(u) set(ref(db, 'callRoom'), { active: true, url: u }); };
        document.getElementById('eCl').onclick = () => set(ref(db, 'callRoom'), { active: false });
        document.getElementById('cCl').onclick = () => { if(confirm("Chat silinsin mi?")) remove(ref(db, 'messages')); };
    </script>
</body>
</html>
