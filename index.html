<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İmanPowerTeşkilat | V10 PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen">
        <div class="cyber-overlay"></div>
        <div class="login-frame">
            <h1 class="main-title">İMANPOWER<span>TEŞKİLAT</span></h1>
            <p class="system-status">SİSTEM DURUMU: ERİŞİM BEKLENİYOR...</p>
            <div class="auth-inputs">
                <input type="text" id="username" placeholder="OPERATÖR ADI" autocomplete="off">
                <input type="password" id="password" placeholder="GÜVENLİK KODU">
            </div>
            <button onclick="checkLogin()" class="action-btn">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="main-panel" style="display: none;">
        <aside class="sidebar">
            <div class="side-header">IPT // V10</div>
            <div class="active-status"><span class="dot pulse"></span> <span id="active-count">0 AKTİF</span></div>
            
            <nav class="side-nav">
                <button onclick="showTab('chat-tab')" class="n-btn active" id="btn-chat">📡 SİNYAL HATTI</button>
                <button onclick="showTab('ann-tab')" class="n-btn" id="btn-ann">📢 BÜLTEN</button>
                <button onclick="showTab('proj-tab')" class="n-btn" id="btn-proj">📂 OPERASYONLAR</button>
                <button onclick="showTab('top-secret-tab')" class="n-btn special" id="btn-top">⚡ ÜST MEVKİ</button>
            </nav>

            <div class="side-footer">
                <div id="op-name">---</div>
                <div id="op-location">📍 KONUM BEKLENİYOR</div>
                <button onclick="location.reload()" class="kill-btn">BAĞLANTIYI KES</button>
            </div>
        </aside>

        <main class="main-stage">
            <div id="chat-tab" class="tab-content">
                <div class="stage-header">STRATEJİK İLETİŞİM KANALI</div>
                <div id="chat-display"></div>
                <div class="chat-bar">
                    <input type="text" id="chat-message" placeholder="Komut ilet..." onkeypress="if(event.key==='Enter') sendLiveMessage()">
                    <button onclick="sendLiveMessage()">GÖNDER</button>
                </div>
            </div>

            <div id="ann-tab" class="tab-content" style="display: none;">
                <div class="stage-header">MERKEZİ DUYURULAR</div>
                <div id="ann-list" class="grid-layout"></div>
            </div>

            <div id="proj-tab" class="tab-content" style="display: none;">
                <div class="stage-header">AKTİF OPERASYONLAR</div>
                <div class="grid-layout" id="project-list"></div>
            </div>

            <div id="top-secret-tab" class="tab-content" style="display: none;">
                <div class="stage-header">ÜST MEVKİ VERİ TABANI</div>
                <div id="secret-auth" class="secret-overlay">
                    <h3>YETKİ KONTROLÜ</h3>
                    <input type="password" id="secret-key" placeholder="ÜST MEVKİ ŞİFRESİ">
                    <button onclick="unlockSecret()" class="pro-btn">YETKİ AL</button>
                </div>
                <div id="secret-content" style="display: none;" class="grid-layout">
                    </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
