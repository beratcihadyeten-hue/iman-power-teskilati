<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPT | Ultimate Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 class="glitch-text">İMANPOWER</h1>
            <div class="auth-fields">
                <input type="text" id="username" placeholder="OPERATÖR">
                <input type="password" id="password" placeholder="ERİŞİM ŞİFRESİ">
            </div>
            <button onclick="checkLogin()" class="cyber-btn">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="main-panel" style="display: none;">
        <nav class="side-nav">
            <div class="nav-header">IPT // V6 PRO</div>
            <button onclick="showTab('chat-tab')" class="n-item active">📡 CANLI HAT</button>
            <button onclick="showTab('ann-tab')" class="n-item">📢 DUYURULAR</button>
            <button onclick="showTab('proj-tab')" class="n-item">📁 PROJELER</button>
            <button onclick="location.reload()" class="logout-btn">🔴 BAĞLANTIYI KES</button>
        </nav>

        <main class="viewport">
            <div id="chat-tab" class="tab-content">
                <div class="section-title">KRİPTOLU SOHBET BİRİMİ</div>
                <div id="chat-display"></div>
                <div class="chat-controls">
                    <input type="text" id="chat-message" placeholder="Mesajını ilet..." onkeypress="if(event.key==='Enter') sendLiveMessage()">
                    <button onclick="sendLiveMessage()">GÖNDER</button>
                </div>
            </div>

            <div id="ann-tab" class="tab-content" style="display: none;">
                <div class="section-title">MERKEZİ DUYURULAR</div>
                <div id="ann-list"></div>
            </div>

            <div id="proj-tab" class="tab-content" style="display: none;">
                <div class="section-title">AKTİF OPERASYONLAR</div>
                <div class="proj-grid">
                    <div class="p-card"><h3>Roblox Bus Sim</h3><p>IETT temalı duraklar ve NPC boarding mantığı.</p></div>
                    <div class="p-card"><h3>Realistic Football</h3><p>Power-bar fiziği ve özel animasyonlar.</p></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
