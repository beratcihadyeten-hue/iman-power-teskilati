<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İPT v5.8 | Elite Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --c: #111; --chat-bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { width: 90%; max-width: 380px; padding: 30px; background: var(--c); border: 2px solid var(--p); border-radius: 20px; text-align: center; }
        h1 { font-family: 'Orbitron'; color: var(--p); letter-spacing: 4px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Rajdhani'; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* APP */
        #app { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; scroll-behavior: smooth; }
        .page { display: none; flex-direction: column; gap: 15px; }
        .page.active { display: flex; }

        /* MODERN CHAT TASARIMI */
        #chat-list { display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .chat-msg { display: flex; flex-direction: column; max-width: 80%; }
        .chat-msg.me { align-self: flex-end; }
        .chat-msg.other { align-self: flex-start; }
        
        .msg-inner { padding: 10px 14px; border-radius: 18px; position: relative; font-size: 0.95rem; line-height: 1.4; }
        .me .msg-inner { background: var(--p); color: #000; border-bottom-right-radius: 2px; box-shadow: 0 4px 15px rgba(0,255,65,0.2); }
        .other .msg-inner { background: #1a1a1a; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        .msg-u { font-size: 0.7rem; font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .me .msg-u { color: #004411; }
        .other .msg-u { color: var(--p); }

        .chat-input-area { position: fixed; bottom: 85px; left: 0; width: 100%; padding: 10px 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; gap: 10px; }
        .chat-input-area input { margin: 0; border-radius: 25px; padding: 12px 20px; background: #111; border: 1px solid #333; flex: 1; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--p); border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* MEDYA & KAYITLAR */
        .v-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .v-card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .v-card video, .v-card iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
        .v-title { padding: 10px; color: var(--p); font-size: 0.8rem; font-weight: bold; background: #161616; }
        .box { background: #111; border-radius: 12px; padding: 15px; border-left: 4px solid var(--p); margin-bottom: 10px; position: relative; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 0.6rem; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--p); text-shadow: 0 0 10px var(--p); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; }

        .call-btn { width: 100px; height: 100px; border-radius: 50%; background: var(--p); border: none; font-size: 2.5rem; cursor: pointer; transition: 0.5s; }
        .pulse { animation: p 1.5s infinite; background: #ff3e3e !important; }
        @keyframes p { 0% { box-shadow: 0 0 0 0px rgba(255, 62, 62, 0.7); } 100% { box-shadow: 0 0 0 30px rgba(255, 62, 62, 0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>İM-P-T</h1>
            <input type="text" id="u" placeholder="Kod Adı">
            <input type="email" id="m" placeholder="Gmail">
            <input type="password" id="p" placeholder="Şifre">
            <button class="btn-main" id="loginBtn">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="app">
        <div class="content" id="scroll-area">
            <div id="p-ann" class="page active"><h2 style="color:var(--p); font-family:'Orbitron'; margin-bottom:15px;">KAYITLAR</h2><div id="ann-list"></div></div>
            <div id="p-vid" class="page"><h2 style="color:var(--p); font-family:'Orbitron'; margin-bottom:15px;">MEDYA</h2><div id="vid-list" class="v-grid"></div></div>
            <div id="p-call" class="page" style="align-items:center; justify-content:center; height:100%;">
                <button id="callBtn" class="call-btn" onclick="startCall()">📞</button>
                <h3 id="call-status" style="margin-top:20px; color:#444; font-family:'Orbitron';">HAT BEKLENİYOR</h3>
            </div>
            <div id="p-chat" class="page"><div id="chat-list"></div><div class="chat-input-area"><input type="text" id="mI" placeholder="Mesaj yaz..."><button id="sB" class="send-btn">➤</button></div></div>
            
            <div id="p-adm" class="page">
                <h2 style="color:#ff3e3e; font-family:'Orbitron';">KOMUTA MERKEZİ</h2>
                <div id="adm-form"><input type="password" id="aK" placeholder="Admin Key"><button class="btn-main" id="aB" style="background:#ff3e3e;">YETKİ AL</button></div>
                <div id="adm-ctrl" style="display:none;">
                    <div id="u-list" style="margin-bottom:20px;"></div>
                    <button class="btn-main" id="nAnn">📢 DUYURU EKLE</button>
                    <button class="btn-main" id="dAnn" style="background:#333;">🗑️ DUYURULARI SIFIRLA</button>
                    <button class="btn-main" id="nVid" style="background:#0055ff;">🎬 LİNK EKLE (YT/WEB)</button>
                    <input type="file" id="fVid" accept="video/*" style="display:none;">
                    <button class="btn-main" onclick="document.getElementById('fVid').click()" style="background:#6a00ff;">📁 DOSYA YÜKLE</button>
                    <button class="btn-main" id="dVid" style="background:#aa0000;">🗑️ MEDYAYI TEMİZLE</button>
                    <button class="btn-main" id="sCl" style="background:#ff9900; color:#000;">📞 ARAMA BAŞLAT</button>
                    <button class="btn-main" id="eCl" style="background:#440000;">🚫 ARAMA BİTİR</button>
                    <button class="btn-main" id="cCl" style="background:#ff3e3e;">🗑️ CHATİ SİL</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go('ann', this)">📢<span>KAYIT</span></div>
            <div class="nav-item" onclick="go('vid', this)">🎬<span>MEDYA</span></div>
            <div class="nav-item" onclick="go('call', this)">📞<span>HAT</span></div>
            <div class="nav-item" onclick="tabChat(this)">💬<span>CHAT</span></div>
            <div class="nav-item" onclick="go('adm', this)">🛡️<span>ADMİN</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const cfg = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        const users = {
            "osimhendizkapağı": { m: "mdegirmenci244@gmail.com", p: ".321mustafa" },
            "kuranokuyandefans": { m: "reozt2000@gmail.com", p: ".123reşit321." },
            "yetimhanekundakçısı": { m: "g17058525@gmail.com", p: "ismailçipe" },
            "müslimmendez": { m: "mustafaslan.gamer1907@gmail.com", p: "mus10ta20fa30" },
            "duvaradam": { m: "beratcihadyeten@gmail.com", p: "geçityokberobaba41" }
        };

        let me = "";
        window.roomUrl = null;

        document.getElementById('loginBtn').onclick = () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const m = document.getElementById('m').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            if(users[u] && users[u].m === m && users[u].p === p) {
                me = u; document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                set(ref(db, 'online/' + u), true); onDisconnect(ref(db, 'online/' + u)).remove(); init();
            } else alert("Geçersiz Kimlik!");
        };

        window.go = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active'); el.classList.add('active');
        };

        window.tabChat = (el) => { go('chat', el); setTimeout(scrollChat, 100); };
        function scrollChat() { const a = document.getElementById('scroll-area'); a.scrollTop = a.scrollHeight; }

        function init() {
            // DUYURULARI ÇEK
            onValue(ref(db, 'ann'), s => {
                const list = document.getElementById('ann-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    list.insertAdjacentHTML('afterbegin', `<div class="box"><strong>${d.t}</strong><br><small style="color:#666">${d.time}</small></div>`);
                });
            });

            // MEDYALARI ÇEK
            onValue(ref(db, 'videos'), s => {
                const list = document.getElementById('vid-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    let h = "";
                    if(d.type === "file") h = `<video src="${d.url}" controls></video>`;
                    else if(d.url.includes('youtu')) {
                        const id = d.url.includes('v=') ? d.url.split('v=')[1].split('&')[0] : d.url.split('/').pop();
                        h = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
                    } else h = `<iframe src="${d.url}"></iframe>`;
                    list.insertAdjacentHTML('afterbegin', `<div class="v-card">${h}<div class="v-title">${d.t}</div></div>`);
                });
            });

            // CHAT ÇEK
            onValue(ref(db, 'messages'), s => {
                const list = document.getElementById('chat-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    const cls = d.u === me ? 'me' : 'other';
                    list.innerHTML += `<div class="chat-msg ${cls}"><div class="msg-inner"><div class="msg-u">${d.u}</div>${d.t}</div></div>`;
                });
                scrollChat();
            });

            // ARAMA DURUMU
            onValue(ref(db, 'callRoom'), s => {
                const d = s.val(); const btn = document.getElementById('callBtn'); const st = document.getElementById('call-status');
                if(d && d.active) {
                    btn.classList.add('pulse'); st.innerText = "HAT AKTİF - BAĞLAN"; st.style.color = "#ff3e3e"; window.roomUrl = d.url;
                } else {
                    btn.classList.remove('pulse'); st.innerText = "HAT BEKLENİYOR"; st.style.color = "#444"; window.roomUrl = null;
                }
            });

            // ONLİNE LİSTESİ (Admin Panel)
            onValue(ref(db, 'online'), s => {
                const list = document.getElementById('u-list'); if(!list) return;
                list.innerHTML = '<h4 style="color:#666; margin-bottom:10px;">AKTİF PERSONEL</h4>';
                const on = s.val() || {};
                Object.keys(users).forEach(usr => {
                    list.innerHTML += `<div class="user-row"><span>${usr}</span><div class="online-dot ${on[usr]?'active':''}"></div></div>`;
                });
            });
        }

        // ACTIONS
        window.startCall = () => { if(window.roomUrl) window.open(window.roomUrl, '_blank'); else alert("Aktif hat yok!"); };

        document.getElementById('sB').onclick = () => {
            const t = document.getElementById('mI').value.trim();
            if(t) { push(ref(db, 'messages'), { u: me, t: t }); document.getElementById('mI').value = ''; }
        };

        document.getElementById('aB').onclick = () => {
            if(document.getElementById('aK').value === "imanpoweradmini31") {
                document.getElementById('adm-form').style.display = 'none';
                document.getElementById('adm-ctrl').style.display = 'block';
            }
        };

        // ADMIN BUTTONS
        document.getElementById('nAnn').onclick = () => { const t = prompt("Duyuru:"); if(t) push(ref(db, 'ann'), { t: t, time: new Date().toLocaleString('tr-TR') }); };
        document.getElementById('dAnn').onclick = () => { if(confirm("Duyurular silinsin mi?")) remove(ref(db, 'ann')); };
        document.getElementById('nVid').onclick = () => { const t = prompt("Başlık:"); const u = prompt("Link:"); if(t && u) push(ref(db, 'videos'), { t: t, url: u, type: "link" }); };
        document.getElementById('dVid').onclick = () => { if(confirm("Medya silinsin mi?")) remove(ref(db, 'videos')); };
        document.getElementById('sCl').onclick = () => { const u = prompt("Arama Linki:"); if(u) set(ref(db, 'callRoom'), { active: true, url: u }); };
        document.getElementById('eCl').onclick = () => { if(confirm("Bitir?")) set(ref(db, 'callRoom'), { active: false, url: "" }); };
        document.getElementById('cCl').onclick = () => { if(confirm("Chat temizlensin mi?")) remove(ref(db, 'messages')); };

        document.getElementById('fVid').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const title = prompt("Video Başlığı:"); if(!title) return;
            const r = new FileReader();
            r.onload = (el) => { push(ref(db, 'videos'), { t: title, url: el.target.result, type: "file" }); alert("Yüklendi!"); };
            r.readAsDataURL(file);
        };
    </script>
</body>
</html>
