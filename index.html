<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İPT v5.7 | Full Komuta</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --c: #0f0f0f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { width: 90%; max-width: 380px; padding: 30px; background: var(--c); border: 2px solid var(--p); border-radius: 20px; text-align: center; }
        h1 { font-family: 'Orbitron'; color: var(--p); letter-spacing: 4px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Rajdhani'; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* ANA YAPI */
        #app { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 110px; }
        .page { display: none; flex-direction: column; gap: 15px; }
        .page.active { display: flex; }

        /* NAVİGASYON */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0a; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 0.65rem; font-family: 'Orbitron'; cursor: pointer; }
        .nav-item.active { color: var(--p); text-shadow: 0 0 10px var(--p); }

        /* MEDYA GRID */
        .v-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .v-card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .v-card iframe, .v-card video { width: 100%; aspect-ratio: 16/9; border: none; background: #000; }
        .v-title { padding: 6px; color: var(--p); font-size: 0.65rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* DİĞER */
        .box { background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; border-left: 4px solid var(--p); margin-bottom: 10px; }
        .chat-input-area { position: fixed; bottom: 85px; left: 5%; width: 90%; display: flex; gap: 8px; background: #000; padding: 5px; border-radius: 12px; }
        .call-btn { width: 90px; height: 90px; border-radius: 50%; background: var(--p); border: none; font-size: 2rem; cursor: pointer; }
        .pulse { animation: p 2s infinite; }
        @keyframes p { 0% { box-shadow: 0 0 0 0px rgba(0, 255, 65, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(0, 255, 65, 0); } }
        .user-row { display: flex; justify-content: space-between; padding: 8px; background: #0c0c0c; border-radius: 6px; margin-bottom: 4px; font-size: 0.8rem; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #222; }
        .online-dot.active { background: var(--p); box-shadow: 0 0 8px var(--p); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>İM-P-T</h1>
            <input type="text" id="u" placeholder="Kod Adı">
            <input type="email" id="m" placeholder="Gmail">
            <input type="password" id="p" placeholder="Şifre">
            <button class="btn-main" id="loginBtn">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="app">
        <div class="content">
            <div id="p-ann" class="page active"><h2 style="color:var(--p); font-family:'Orbitron';">KAYITLAR</h2><div id="ann-list"></div></div>
            <div id="p-vid" class="page"><h2 style="color:var(--p); font-family:'Orbitron';">MEDYA</h2><div id="vid-list" class="v-grid"></div></div>
            <div id="p-call" class="page">
                <h2 style="color:var(--p); font-family:'Orbitron';">GÜVENLİ HAT</h2>
                <div style="text-align:center; margin-top:30px;">
                    <button id="callBtn" class="call-btn" onclick="startCall()">📞</button>
                    <h3 id="call-status" style="margin-top:15px; color:#444;">BEKLENİYOR...</h3>
                </div>
            </div>
            <div id="p-chat" class="page"><div id="chat-list" style="display:flex; flex-direction:column;"></div><div class="chat-input-area"><input type="text" id="mI" placeholder="Mesaj..."><button id="sB" style="background:var(--p); border:none; width:50px; border-radius:8px; font-weight:bold;">></button></div></div>
            
            <div id="p-adm" class="page">
                <h2 style="color:#ff3e3e; font-family:'Orbitron';">ADMİN PANELİ</h2>
                <div id="adm-form"><input type="password" id="aK" placeholder="Admin Key"><button class="btn-main" id="aB" style="background:#ff3e3e;">YETKİ AL</button></div>
                <div id="adm-ctrl" style="display:none;">
                    <div id="u-list"></div>
                    <button class="btn-main" id="nAnn">📢 DUYURU EKLE</button>
                    <button class="btn-main" id="dAnn" style="background:#444;">🗑️ DUYURULARI SİL</button>
                    <button class="btn-main" id="nVid" style="background:#00aaff;">🎬 YT / LİNK EKLE</button>
                    <input type="file" id="fVid" accept="video/*" style="display:none;">
                    <button class="btn-main" onclick="document.getElementById('fVid').click()" style="background:#8a2be2;">📁 DOSYADAN VİDEO YÜKLE</button>
                    <button class="btn-main" id="dVid" style="background:#005577;">🗑️ MEDYAYI TEMİZLE</button>
                    <button class="btn-main" id="sCl" style="background:#ff9900; color:#000;">📞 ARAMA BAŞLAT</button>
                    <button class="btn-main" id="eCl" style="background:#7a0000;">🚫 ARAMAYI BİTİR</button>
                    <button class="btn-main" id="cCl" style="background:#ff3e3e;">🗑️ CHATİ TEMİZLE</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go('ann', this)">📢<span>KAYIT</span></div>
            <div class="nav-item" onclick="go('vid', this)">🎬<span>MEDYA</span></div>
            <div class="nav-item" onclick="go('call', this)">📞<span>HAT</span></div>
            <div class="nav-item" onclick="tabChat(this)">💬<span>CHAT</span></div>
            <div class="nav-item" onclick="go('adm', this)">🛡️<span>ADMİN</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const cfg = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        const users = {
            "osimhendizkapağı": { m: "mdegirmenci244@gmail.com", p: ".321mustafa" },
            "kuranokuyandefans": { m: "reozt2000@gmail.com", p: ".123reşit321." },
            "yetimhanekundakçısı": { m: "g17058525@gmail.com", p: "ismailçipe" },
            "müslimmendez": { m: "mustafaslan.gamer1907@gmail.com", p: "mus10ta20fa30" },
            "duvaradam": { m: "beratcihadyeten@gmail.com", p: "geçityokberobaba41" }
        };

        let me = "";
        window.roomUrl = null;

        document.getElementById('loginBtn').onclick = () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const m = document.getElementById('m').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            if(users[u] && users[u].m === m && users[u].p === p) {
                me = u; document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                set(ref(db, 'online/' + u), true); onDisconnect(ref(db, 'online/' + u)).remove(); init();
            } else alert("Erişim Reddedildi.");
        };

        window.go = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).style.display = 'flex'; el.classList.add('active');
        };

        window.tabChat = (el) => { go('chat', el); setTimeout(() => { document.querySelector('.content').scrollTop = 999999; }, 100); };

        function init() {
            onValue(ref(db, 'ann'), s => {
                const list = document.getElementById('ann-list'); list.innerHTML = '';
                let dta = []; s.forEach(c => dta.unshift(c.val()));
                dta.forEach(d => list.innerHTML += `<div class="box"><strong>${d.t}</strong><br><small>${d.time}</small></div>`);
            });

            onValue(ref(db, 'videos'), s => {
                const list = document.getElementById('vid-list'); list.innerHTML = '';
                let dta = []; s.forEach(c => dta.unshift(c.val()));
                dta.forEach(d => {
                    let mediaHtml = "";
                    if(d.type === "file") {
                        mediaHtml = `<video src="${d.url}" controls></video>`;
                    } else if(d.url.includes('youtube.com') || d.url.includes('youtu.be')) {
                        const vidId = d.url.includes('v=') ? d.url.split('v=')[1].split('&')[0] : d.url.split('/').pop();
                        mediaHtml = `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
                    } else {
                        mediaHtml = `<iframe src="${d.url}"></iframe>`;
                    }
                    list.innerHTML += `<div class="v-card">${mediaHtml}<div class="v-title">${d.t}</div></div>`;
                });
            });

            onValue(ref(db, 'messages'), s => {
                const list = document.getElementById('chat-list'); list.innerHTML = '';
                s.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="chat-msg ${d.u === me ? 'me' : ''}"><div class="msg-inner"><small style="color:var(--p)">${d.u}</small><br>${d.t}</div></div>`;
                });
            });

            onValue(ref(db, 'callRoom'), s => {
                const st = document.getElementById('call-status'); const btn = document.getElementById('callBtn');
                if(s.val() && s.val().active) {
                    st.innerHTML = "🔴 AKTİF"; st.style.color = "red"; btn.classList.add('pulse'); window.roomUrl = s.val().url;
                } else {
                    st.innerHTML = "BEKLENİYOR..."; st.style.color = "#444"; btn.classList.remove('pulse'); window.roomUrl = null;
                }
            });

            onValue(ref(db, 'online'), s => {
                const list = document.getElementById('u-list'); if(!list) return;
                list.innerHTML = '<h4 style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">AKTİF ÜYELER</h4>';
                const onlines = s.val() || {};
                Object.keys(users).forEach(u => {
                    list.innerHTML += `<div class="user-row"><span>${u}</span><div class="online-dot ${onlines[u] ? 'active' : ''}"></div></div>`;
                });
            });
        }

        window.startCall = () => { if(window.roomUrl) window.open(window.roomUrl, '_blank'); else alert("Hat yok!"); };

        document.getElementById('sB').onclick = () => {
            const txt = document.getElementById('mI').value;
            if(txt) { push(ref(db, 'messages'), { u: me, t: txt }); document.getElementById('mI').value = ''; }
        };

        document.getElementById('aB').onclick = () => {
            if(document.getElementById('aK').value === "imanpoweradmini31") {
                document.getElementById('adm-form').style.display = 'none';
                document.getElementById('adm-ctrl').style.display = 'block';
            }
        };

        /* TÜM ADMIN FONKSİYONLARI BURADA */
        document.getElementById('nAnn').onclick = () => {
            const t = prompt("Duyuru metni:");
            if(t) push(ref(db, 'ann'), { t: t, time: new Date().toLocaleString('tr-TR') });
        };

        document.getElementById('dAnn').onclick = () => { if(confirm("Tüm duyurular silinsin mi?")) remove(ref(db, 'ann')); };

        document.getElementById('nVid').onclick = () => {
            const t = prompt("Başlık:"); const u = prompt("YouTube veya Site Linki:");
            if(t && u) push(ref(db, 'videos'), { t: t, url: u, type: "link" });
        };

        document.getElementById('fVid').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            const title = prompt("Video Başlığı:");
            if(!title) return;
            reader.onload = (el) => {
                push(ref(db, 'videos'), { t: title, url: el.target.result, type: "file" });
                alert("Video yüklendi!");
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('dVid').onclick = () => { if(confirm("Medyalar silinsin mi?")) remove(ref(db, 'videos')); };

        document.getElementById('sCl').onclick = () => { 
            const u = prompt("Arama (Jitsi/Meet) Linki:"); 
            if(u) set(ref(db, 'callRoom'), { active: true, url: u }); 
        };

        document.getElementById('eCl').onclick = () => { if(confirm("Arama bitirilsin mi?")) set(ref(db, 'callRoom'), { active: false, url: "" }); };

        document.getElementById('cCl').onclick = () => { if(confirm("Chat temizlensin mi?")) remove(ref(db, 'messages')); };
    </script>
</body>
</html>
