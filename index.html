<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPT | Operasyon Merkezi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 class="glitch">İMANPOWER</h1>
            <p>TEŞKİLAT TERMİNALİ</p>
            <input type="text" id="username" placeholder="OPERATÖR ADI">
            <input type="password" id="password" placeholder="ERİŞİM KODU">
            <button onclick="checkLogin()" class="burn-btn">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="main-panel" style="display: none;">
        <nav class="side-nav">
            <div class="brand">IPT // CORE</div>
            <button onclick="showTab('chat-tab')" class="nav-item">📡 CANLI HAT</button>
            <button onclick="showTab('ann-tab')" class="nav-item">📢 DUYURULAR</button>
            <button onclick="location.reload()" class="exit-btn">ÇIKIŞ</button>
        </nav>

        <main class="viewport">
            <div id="chat-tab" class="tab-content">
                <div class="chat-header">KRİPTOLU İLETİŞİM KANALI</div>
                <div id="chat-display"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-message" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') sendLiveMessage()">
                    <button onclick="sendLiveMessage()">GÖNDER</button>
                </div>
            </div>

            <div id="ann-tab" class="tab-content" style="display: none; padding: 30px;">
                <div class="ann-item">
                    <h3>SİSTEM GÜNCELLEMESİ V5</h3>
                    <p>Firebase Canlı Sohbet ve Modern UI aktif edildi. Yazma butonu sorunu çözüldü.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
