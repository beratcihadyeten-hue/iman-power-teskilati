<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İPT v5.3 | Operasyon Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --c: #0f0f0f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { width: 90%; max-width: 380px; padding: 30px; background: var(--c); border: 2px solid var(--p); border-radius: 20px; text-align: center; }
        h1 { font-family: 'Orbitron'; color: var(--p); letter-spacing: 4px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Rajdhani'; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* ANA YAPI */
        #app { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; flex-direction: column; gap: 15px; }
        .page.active { display: flex; }

        /* ALT NAVİGASYON (DÜZELTİLDİ) */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0a; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; text-decoration: none; font-size: 0.65rem; font-family: 'Orbitron'; cursor: pointer; }
        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--p); text-shadow: 0 0 10px var(--p); }

        /* DUYURU & CHAT BOX */
        .box { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; border-left: 4px solid var(--p); position: relative; }
        .chat-msg { margin-bottom: 10px; max-width: 85%; }
        .chat-msg.me { align-self: flex-end; }
        .msg-inner { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .me .msg-inner { border-color: var(--p); background: rgba(0,255,65,0.05); }
        
        /* CHAT INPUT */
        .chat-input-area { position: fixed; bottom: 85px; left: 5%; width: 90%; display: flex; gap: 10px; background: #000; padding: 5px; border-radius: 12px; }

        /* VİDEO GRID */
        .v-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .v-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .v-card iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        .v-title { padding: 10px; color: var(--p); font-weight: bold; text-align: center; font-size: 0.9rem; }

        /* AKTİF LİSTESİ */
        .user-row { display: flex; justify-content: space-between; padding: 10px; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 5px; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .online-dot.active { background: var(--p); box-shadow: 0 0 8px var(--p); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>İM-P-T</h1>
            <input type="text" id="u" placeholder="Kod Adı">
            <input type="email" id="m" placeholder="Gmail">
            <input type="password" id="p" placeholder="Şifre">
            <button class="btn-main" id="loginBtn">SİSTEME GİR</button>
        </div>
    </div>

    <div id="app">
        <div class="content">
            <div id="p-ann" class="page active">
                <h2 style="color:var(--p); font-family:'Orbitron';">KAYITLAR</h2>
                <div id="ann-list"></div>
            </div>
            
            <div id="p-vid" class="page">
                <h2 style="color:var(--p); font-family:'Orbitron';">VİDEOLAR</h2>
                <div id="vid-list" class="v-grid"></div>
            </div>

            <div id="p-chat" class="page" style="display:none; flex-direction:column;">
                <div id="chat-list" style="display:flex; flex-direction:column;"></div>
                <div class="chat-input-area">
                    <input type="text" id="mI" placeholder="Mesaj..." style="margin:0;">
                    <button id="sB" style="background:var(--p); border:none; width:50px; border-radius:8px; font-weight:bold;">></button>
                </div>
            </div>

            <div id="p-adm" class="page">
                <h2 style="color:#ff3e3e; font-family:'Orbitron';">ADMİN PANEL</h2>
                <div id="adm-form"><input type="password" id="aK" placeholder="Admin Anahtarı"><button class="btn-main" id="aB" style="background:#ff3e3e;">YETKİ VER</button></div>
                <div id="adm-ctrl" style="display:none;">
                    <div id="u-list" style="margin-bottom:20px;"></div>
                    <button class="btn-main" id="nAnn">📢 DUYURU PAYLAŞ</button>
                    <button class="btn-main" id="nVid" style="background:#00aaff;">🎬 VİDEO YÜKLE</button>
                    <button class="btn-main" id="cCl" style="background:#ff3e3e;">🗑️ CHATI TEMİZLE</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go('ann', this)"><i>📢</i><span>KAYIT</span></div>
            <div class="nav-item" onclick="go('vid', this)"><i>🎬</i><span>VİDEO</span></div>
            <div class="nav-item" onclick="go('chat', this)"><i>💬</i><span>CHAT</span></div>
            <div class="nav-item" onclick="go('adm', this)"><i>🛡️</i><span>ADMİN</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const cfg = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        const users = {
            "osimhendizkapağı": { m: "mdegirmenci244@gmail.com", p: ".321mustafa" },
            "kuranokuyandefans": { m: "reozt2000@gmail.com", p: ".123reşit321." },
            "yetimhanekundakçısı": { m: "g17058525@gmail.com", p: "ismailçipe" },
            "müslimmendez": { m: "mustafaslan.gamer1907@gmail.com", p: "mus10ta20fa30" },
            "duvaradam": { m: "beratcihadyeten@gmail.com", p: "geçityokberobaba41" }
        };

        let me = "";

        // GİRİŞ SİSTEMİ
        document.getElementById('loginBtn').onclick = () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const m = document.getElementById('m').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            
            if(users[u] && users[u].m === m && users[u].p === p) {
                me = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                set(ref(db, 'online/' + u), true);
                onDisconnect(ref(db, 'online/' + u)).remove();
                init();
            } else { alert("ERİŞİM REDDEDİLDİ!"); }
        };

        // SAYFA GEÇİŞİ
        window.go = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).style.display = 'flex';
            el.classList.add('active');
        };

        function init() {
            // DUYURULAR (ANLIK)
            onValue(ref(db, 'ann'), s => {
                const list = document.getElementById('ann-list');
                list.innerHTML = '';
                let data = [];
                s.forEach(child => { data.unshift(child.val()); });
                data.forEach(d => {
                    list.innerHTML += `<div class="box"><strong>${d.t}</strong><br><small style="color:#666">${d.time}</small></div><br>`;
                });
            });

            // VİDEOLAR (ANLIK)
            onValue(ref(db, 'videos'), s => {
                const list = document.getElementById('vid-list');
                list.innerHTML = '';
                let data = [];
                s.forEach(child => { data.unshift(child.val()); });
                data.forEach(d => {
                    const vidId = d.url.includes('v=') ? d.url.split('v=')[1].split('&')[0] : d.url.split('/').pop();
                    list.innerHTML += `<div class="v-card"><iframe src="https://www.youtube.com/embed/${vidId}"></iframe><div class="v-title">${d.t}</div></div>`;
                });
            });

            // CHAT
            onValue(ref(db, 'messages'), s => {
                const list = document.getElementById('chat-list');
                list.innerHTML = '';
                s.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `<div class="chat-msg ${d.u === me ? 'me' : ''}"><div class="msg-inner"><small style="color:var(--p)">${d.u}</small><br>${d.t}</div></div>`;
                });
                document.querySelector('.content').scrollTop = 999999;
            });

            // AKTİFLER
            onValue(ref(db, 'online'), s => {
                const list = document.getElementById('u-list');
                if(!list) return;
                list.innerHTML = '<h4 style="margin-bottom:10px;">OPERASYONDAKİLER</h4>';
                const onlines = s.val() || {};
                Object.keys(users).forEach(usr => {
                    const status = onlines[usr] ? 'active' : '';
                    list.innerHTML += `<div class="user-row"><span>${usr.toUpperCase()}</span><div class="online-dot ${status}"></div></div>`;
                });
            });
        }

        // MESAJ GÖNDER
        document.getElementById('sB').onclick = () => {
            const txt = document.getElementById('mI').value;
            if(txt) { push(ref(db, 'messages'), { u: me, t: txt }); document.getElementById('mI').value = ''; }
        };

        // ADMIN İŞLEMLERİ
        document.getElementById('aB').onclick = () => {
            if(document.getElementById('aK').value === "imanpoweradmini31") {
                document.getElementById('adm-form').style.display = 'none';
                document.getElementById('adm-ctrl').style.display = 'block';
            }
        };

        document.getElementById('nAnn').onclick = () => {
            const t = prompt("Duyuru Metni:");
            if(t) push(ref(db, 'ann'), { t: t, time: new Date().toLocaleString('tr-TR') });
        };

        document.getElementById('nVid').onclick = () => {
            const t = prompt("Video Başlığı:");
            const u = prompt("YouTube Linki:");
            if(t && u) push(ref(db, 'videos'), { t: t, url: u });
        };

        document.getElementById('cCl').onclick = () => {
            if(confirm("Tüm mesajlar silinsin mi?")) remove(ref(db, 'messages'));
        };
    </script>
</body>
</html>
