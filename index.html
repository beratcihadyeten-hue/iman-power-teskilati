<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPT | Operasyon Merkezi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 class="glitch">İMAN POWER TEŞKİLATI</h1>
            <input type="text" id="username" placeholder="KOD ADI">
            <input type="password" id="password" placeholder="ŞİFRE">
            <button onclick="checkLogin()" class="btn-main">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="main-panel" style="display: none;">
        <nav class="cyber-nav">
            <div class="nav-brand">IPT // CORE</div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="showTab('chat-tab')">📡 SOHBET</button>
                <button class="nav-btn" onclick="showTab('announcements-tab')">📢 DUYURULAR</button>
                <button class="nav-btn" onclick="showTab('projects-tab')">📁 PROJELER</button>
                <button class="exit-btn" onclick="location.reload()">🔴 ÇIKIŞ</button>
            </div>
        </nav>

        <div class="viewport">
            <div id="chat-tab" class="tab-content">
                <div class="chat-frame">
                    <script id="chatbrojs" src="https://chatbro.com/embed.js?chat_id=9YmR"></script>
                </div>
            </div>

            <div id="announcements-tab" class="tab-content" style="display: none;">
                <div id="announcement-list">
                    </div>
            </div>

            <div id="projects-tab" class="tab-content" style="display: none;">
                <div class="project-grid">
                    <div class="p-card"><h3>Roblox Bus Simulator</h3><p>Durak sistemleri ve NPC mantığı üzerine çalışılıyor.</p></div>
                    <div class="p-card"><h3>Realistic Football</h3><p>Fizik tabanlı vuruş sistemi entegre ediliyor.</p></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
