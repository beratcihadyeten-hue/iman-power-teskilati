<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmanPowerTeşkilatı | Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --c: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #login { background: var(--c); padding: 40px; border-radius: 10px; border: 1px solid var(--p); text-align: center; box-shadow: 0 0 20px rgba(0,255,65,0.2); width: 320px; }
        h1 { font-family: 'Orbitron'; color: var(--p); font-size: 1.2rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--p); border-radius: 5px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--p); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--p); transform: translateY(-2px); }

        /* ANA PANEL */
        #panel { display: none; width: 95%; max-width: 900px; height: 90vh; background: var(--c); border: 1px solid #222; border-radius: 10px; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .duyuru { background: rgba(0,255,65,0.05); border-left: 4px solid var(--p); padding: 10px; margin: 15px 0; font-size: 0.9rem; }
        #chat { flex-grow: 1; background: #000; border-radius: 5px; padding: 15px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #0a0a0a; padding-bottom: 4px; }
        .msg b { color: var(--p); margin-right: 5px; }
        .send-area { display: flex; gap: 10px; }
        #adminBtn { background: #ff3e3e; width: auto; font-size: 0.7rem; padding: 5px 10px; }
    </style>
</head>
<body>

    <div id="login">
        <h1>TEŞKİLAT GİRİŞİ</h1>
        <input type="text" id="u" placeholder="İsim (Örn: duvaradam)">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()">SİSTEME GİR</button>
    </div>

    <div id="panel">
        <div class="head">
            <span id="welcome" style="color:var(--p); font-weight:bold;"></span>
            <button id="adminBtn" onclick="admin()">ADMİN</button>
        </div>
        <div class="duyuru"><b>Duyuru:</b> <span id="annText">Yükleniyor...</span></div>
        <div id="chat"></div>
        <div class="send-area">
            <input type="text" id="msgInp" placeholder="Mesaj yazın...">
            <button style="width:100px; margin:0;" onclick="gonder()">GÖNDER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // Senin Firebase Bilgilerin
        const firebaseConfig = {
            apiKey: "AIzaSyBtzTIQm1vvsYZRHV6t9RsTBK3Uma6K8rA",
            authDomain: "imanpowerchat.firebaseapp.com",
            databaseURL: "https://imanpowerchat-default-rtdb.firebaseio.com",
            projectId: "imanpowerchat",
            storageBucket: "imanpowerchat.firebasestorage.app",
            appId: "1:809946654937:web:f34de2239ecdeb648036c8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Kullanıcı Listesi (Sisteme kayıtlı)
        const uyeler = {
            "osimhendizkapağı": ".321mustafa",
            "kuranokuyandefans": ".123reşit31.",
            "yetimhanekundakçısı": "ismailçipe",
            "duvaradam": "geçityokberobaba41"
        };

        let user = "";

        window.giris = function() {
            const name = document.getElementById('u').value;
            const pass = document.getElementById('s').value;

            if (uyeler[name] && uyeler[name] === pass) {
                user = name;
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
                document.getElementById('welcome').innerText = "Hoş geldin, " + name;
                baslat();
            } else {
                alert("Teşkilat kayıtlarında bulunamadı!");
            }
        }

        function baslat() {
            onValue(ref(db, 'messages'), (s) => {
                const box = document.getElementById('chat');
                box.innerHTML = '';
                s.forEach(c => {
                    box.innerHTML += `<div class="msg"><b>${c.val().u}:</b> ${c.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            onValue(ref(db, 'duyuru'), (s) => {
                if(s.exists()) document.getElementById('annText').innerText = s.val();
            });
        }

        window.gonder = function() {
            const t = document.getElementById('msgInp').value;
            if(t) {
                push(ref(db, 'messages'), { u: user, t: t });
                document.getElementById('msgInp').value = '';
            }
        }

        window.admin = function() {
            if(prompt("Admin Şifresi:") === "admin31") {
                const d = prompt("Yeni Duyuru:");
                if(d) set(ref(db, 'duyuru'), d);
            }
        }
    </script>
</body>
</html>
